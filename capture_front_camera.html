<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Frontale</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
video, canvas { display: none; }
img { max-width: 100%; height: auto; border-radius: 12px; }
#app { text-align: center; }
#imgBox { display: none; position: relative; }
#imgBox img { max-width: 100vw; max-height: 100vh; }
#imgBox button { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 14px 40px; font-size: 18px; border: none; border-radius: 30px; background: #6C63FF; color: #fff; cursor: pointer; }
#loading { color: #fff; font-size: 22px; padding: 40px; }
#error { color: #ff6b6b; font-size: 18px; padding: 40px; display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="loading">Demande d'accès à la caméra...</div>
  <div id="error"></div>
  <div id="imgBox">
    <img id="photo" alt="Photo">
    <button onclick="location.reload()">Nouvelle photo</button>
  </div>
</div>
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
<script>
(async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();

    setTimeout(() => {
      const canvas = document.getElementById("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0);
      const data = canvas.toDataURL("image/jpeg", 0.9);

      stream.getTracks().forEach(t => t.stop());

      document.getElementById("loading").style.display = "none";
      const img = document.getElementById("photo");
      img.src = data;
      document.getElementById("imgBox").style.display = "block";
    }, 500);
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const err = document.getElementById("error");
    err.style.display = "block";
    err.textContent = "Erreur: " + (e.name === "NotAllowedError"
      ? "Autorisation caméra refusée. Autorisez l'accès dans les paramètres."
      : e.message || e);
  }
})();
</script>
</body>
</html>
