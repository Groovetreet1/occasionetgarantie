<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameForge</title>
<link rel="stylesheet" href="/static/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo"><i class="fas fa-gamepad" style="color:var(--accent2);font-size:22px"></i> <span style="font-weight:700;font-size:18px">Game<span style="color:var(--accent2)">Forge</span></span></div>
    <button class="btn-primary" id="openModal"><i class="fas fa-plus"></i> Ajouter</button>
  </div>
</header>

<main class="main" id="app">
  <section id="libraryView">
    <div class="hero">
      <h1>Vos <span class="gradient-text">jeux Python</span></h1>
      <p>Importez et jouez à vos jeux Python directement dans le navigateur.</p>
      <div class="hero-stats"><span><strong id="totalGames">0</strong> jeux</span><span class="sep">|</span><span>Streaming 2026</span></div>
    </div>
    <section>
      <div class="section-header"><h2><i class="fas fa-cubes"></i> Bibliothèque</h2>
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Rechercher..."></div>
      </div>
      <div class="games-grid" id="gamesGrid"><div class="empty-state" id="emptyState"><i class="fas fa-joystick" style="font-size:40px;opacity:.3"></i><h3>Aucun jeu</h3><p>Ajoutez votre premier jeu Python.</p></div></div>
    </section>
  </section>

  <section id="playerView" class="hidden">
    <div class="player-bar">
      <button class="btn-icon" id="backBtn"><i class="fas fa-arrow-left"></i></button>
      <div class="player-info"><i class="fas fa-gamepad" id="playerIcon"></i><span id="playerName"></span></div>
      <div><span id="fpsCounter" style="font-size:12px;color:var(--text3);margin-right:8px"></span></div>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas" width="1000" height="650"></canvas>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-lg"></div>
        <p>Connexion au serveur de jeu...</p>
      </div>
    </div>
    <div class="player-status-bar"><span id="playerStatus">⏳ Prêt</span></div>
  </section>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header"><h2><i class="fas fa-magic"></i> Nouveau jeu</h2><button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button></div>
    <form id="gameForm">
      <div class="form-group"><label>Nom</label><input type="text" id="gameName" required></div>
      <div class="form-group"><label>Description</label><textarea id="gameDesc" rows="2"></textarea></div>
      <div class="form-group">
        <label>Fichier .py</label>
        <div class="file-zone" id="fileZone"><i class="fas fa-cloud-upload-alt"></i><p>Glissez-déposez ou cliquez</p><span class="file-name" id="fileName"></span><input type="file" accept=".py"></div>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-rocket"></i> Ajouter</button>
    </form>
  </div>
</div>

<div class="modal-overlay" id="detailOverlay">
  <div class="modal">
    <div class="modal-header"><h2 id="detailTitle"><i class="fas fa-info-circle"></i> Détails</h2><button class="modal-close" id="closeDetail"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <p id="detailDesc"></p>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn-primary" id="playBtn" style="flex:1"><i class="fas fa-play"></i> Jouer</button>
        <button class="btn btn-danger" id="deleteBtn"><i class="fas fa-trash"></i></button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
